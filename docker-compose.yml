# ─────────────────────────────────────────────────────────────
# TradIA — docker-compose.yml
# Runs backend + frontend + nginx on a single VPS
#
# Usage:
#   cp .env.example .env        # fill in your values
#   docker compose up -d
# ─────────────────────────────────────────────────────────────

version: '3.9'

services:

  # ── FastAPI Backend ────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: tradia_backend
    restart: unless-stopped
    env_file: .env
    environment:
      - PYTHONPATH=/app
    volumes:
      # Persist model artifacts and trade history across redeploys
      - ./backend/models:/app/backend/models
      - ./backend/data:/app/backend/data
      - ./backend/logs:/app/backend/logs
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - tradia_net

  # ── Next.js Frontend ───────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        # Backend is reached via Nginx internally to the user's browser
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://yourdomain.com}
    container_name: tradia_frontend
    restart: unless-stopped
    expose:
      - "3000"
    depends_on:
      - backend
    networks:
      - tradia_net

  # ── Nginx Reverse Proxy ────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: tradia_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # Uncomment when you add a domain + SSL cert:
      # - ./ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - backend
      - frontend
    networks:
      - tradia_net

volumes:
  nginx_logs:

networks:
  tradia_net:
    driver: bridge
